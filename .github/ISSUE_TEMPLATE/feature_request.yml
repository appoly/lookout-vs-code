name: Feature request
description: Suggest a focused improvement to the launch, attention, continuity, or review workflow.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the workflow friction rather than only the proposed UI.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy boundary
      options:
        - label: This request does not require terminal scraping, transcript storage, credential access, or silent command execution.
          required: true
