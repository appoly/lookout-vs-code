name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run vsix
      - run: npm run verify:vsix-contents
      - run: npm run audit:runtime
        if: runner.os == 'Linux'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: runner.os == 'Linux'
        with:
          name: lookout-vsix
          path: "*.vsix"

  extension-host:
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            vscode: "1.96.0"
          - os: ubuntu-latest
            vscode: stable
          - os: windows-latest
            vscode: stable
          - os: macos-latest
            vscode: stable
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: xvfb-run -a npm run test:integration
        if: runner.os == 'Linux'
        env:
          LOOKOUT_VSCODE_VERSION: ${{ matrix.vscode }}
      - run: npm run test:integration
        if: runner.os != 'Linux'
        env:
          LOOKOUT_VSCODE_VERSION: ${{ matrix.vscode }}
      - run: xvfb-run -a npm run verify:vsix
        if: runner.os == 'Linux' && matrix.vscode == 'stable'
        env:
          LOOKOUT_VSCODE_VERSION: ${{ matrix.vscode }}
