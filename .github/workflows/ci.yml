name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run vsix
      - run: npm run audit:runtime
        if: runner.os == 'Linux'
      - uses: actions/upload-artifact@v4
        if: runner.os == 'Linux'
        with:
          name: lookout-vsix
          path: "*.vsix"

  extension-host:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            vscode: "1.96.0"
          - os: ubuntu-latest
            vscode: stable
          - os: windows-latest
            vscode: stable
          - os: macos-latest
            vscode: stable
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: xvfb-run -a npm run test:integration
        if: runner.os == 'Linux'
        env:
          LOOKOUT_VSCODE_VERSION: ${{ matrix.vscode }}
      - run: npm run test:integration
        if: runner.os != 'Linux'
        env:
          LOOKOUT_VSCODE_VERSION: ${{ matrix.vscode }}
      - run: npm run verify:vsix
        if: runner.os == 'Linux' && matrix.vscode == 'stable'
        env:
          LOOKOUT_VSCODE_VERSION: ${{ matrix.vscode }}
