name: Provider compatibility advisory

on:
  schedule:
    - cron: '23 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provider-compatibility:
    name: ${{ matrix.os }} advisory
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install latest official provider CLIs
        id: install
        continue-on-error: true
        run: npm install --global @openai/codex@latest @anthropic-ai/claude-code@latest

      - name: Inspect unauthenticated compatibility surfaces
        id: compat
        continue-on-error: true
        env:
          OPENAI_API_KEY: ''
          ANTHROPIC_API_KEY: ''
          CODEX_API_KEY: ''
          CLAUDE_CODE_OAUTH_TOKEN: ''
        run: node scripts/provider-compat.mjs --output-dir artifacts/provider-compat

      - name: Publish advisory summary
        if: always()
        shell: pwsh
        run: |
          "## Provider compatibility: ${{ matrix.os }}" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "CLI install outcome: ``${{ steps.install.outcome }}``" >> $env:GITHUB_STEP_SUMMARY
          "Compatibility outcome: ``${{ steps.compat.outcome }}``" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "This scheduled check does not gate normal CI. A failed advisory marks this run red so provider drift is not silent." >> $env:GITHUB_STEP_SUMMARY

      - name: Upload sanitized compatibility logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: provider-compat-${{ matrix.os }}
          path: artifacts/provider-compat
          if-no-files-found: warn
          retention-days: 14

      - name: Surface provider drift
        if: >-
          always() &&
          (steps.install.outcome != 'success' || steps.compat.outcome != 'success')
        shell: pwsh
        run: |
          Write-Output "::warning::Provider compatibility changed or the latest CLI could not be inspected. Review the sanitized artifacts."
          exit 1
